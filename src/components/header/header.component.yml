$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json

name: Header
group: Components
status: stable
props:
  type: object
  properties:
    header__menu:
      type: array
      title: Menu Items
      description: The list of menu items to display in the header.
      items:
        type: object
        properties:
          label:
            type: string
          url:
            type: string
          submenu:
            type: array
      data:
        - label: Academics
          submenu:
            - label: Undergraduate
              url: #
            - label: Postgraduate
              url: #
        - label: Admissions
          url: /admissions
          submenu:
            - label: International
              url: #
            - label: Domestic
              url: #
        - label: Research
          url: #
        - label: About
          url: #
    header__search_placeholder:
      type: string
      title: Search Placeholder
      description: The placeholder text for the search input.
      data: Search placeholder
slots:
  header__branding:
    title: Branding
    description: Branding content (logo, site name, etc).
  header__menu:
    title: Menu
    description: Navigation menu content.
  header__search:
    title: Search
    description: Search form content.
